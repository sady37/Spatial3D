% profile_vitals_1p8_4p2.cfg — Spatial3D vitals capture, 1.8-4.2 m whole-room gate.
% Scheme-C validation stage: capture raw range-antenna cube over the 1.8-4.2 m gate;
% the edge then projects 16->1 (mean-steering beamform) and transmits int16 PHASE
% (~31 kbps for 103 bins @18.78fps) — the whole vitals pipeline uses only phase.
%
% CLI field units (verified in firmware/mmw_demo_mod/mod/mmw_cli.c):
%   chirpComnCfg <digOutSampRate> <bitsSel> <firSel> <numAdcSamples> <mimoPat> <rampEndUs> <hpfSel>
%     Fs[Msps] = 200/digOutSampRate ;  numRangeBins = numAdcSamples/2 (real sampling)
%   chirpTimingCfg <idleUs> <adcSkipSamples> <txStartUs> <slopeMHzperUs> <startFreqGHz>
%   frameCfg <numChirpsInBurst> <numChirpsAccum> <burstPeriodUs> <numBurstsInFrame>
%            <framePeriodMs> <numFrames>   (framePeriodMs is argv[5], us=ms*1000)
%   rangeAntennaOutput <startBin> <numBins> <layer>
%
% Range design (UNCHANGED from the validated near/gaze profiles — keeps the bin<->range map):
%   Fs = 200/10 = 20 Msps ; numAdcSamples = 1024 -> 512 range bins
%   slope 125 MHz/us, adcTime 51.2us -> ADC BW 6.4 GHz -> dR = c/(2B) = 2.344 cm/bin
%   ramp 57.0 -> 63.875 GHz (fits 57-64, 0.125 GHz margin) ; R_max = 512*2.344cm = 12.0 m
%
% RANGE GATE 1.8-4.2 m (this file's change):
%   bin 77  = 77*2.344cm  = 1.805 m   (>= 1.8)
%   bin 179 = 179*2.344cm = 4.196 m   (~ 4.2)
%   -> rangeAntennaOutput 77 103 1     (103 bins span 1.805-4.196 m)
%
% >>> 20 fps + 1.8-4.2m REQUIRES A FIRMWARE CHANGE — cfg alone cannot do it:
%   RA TLV = 4 + 103 bins x 16 ant x sizeof(cmplx16ImRe_t=4B) = 6596 B/frame
%     (exact, from mmwave_demo.c:498-501).
%   @1.25 Mbaud the firmware bills 9 us/byte -> 6596*9 = 59.4 ms to transmit, but a
%   20fps frame is 50 ms. Over budget -> mmwave_demo.c:564 SKIPS the TLV (frame drops).
%   True 20fps @1.25Mbaud caps at ~82 bins (packet < 50ms) = 1.8-3.7 m only.
%   THIS FILE requests 20fps/103bins anyway (user intent); to make it actually stream
%   pick ONE firmware fix:
%    (A) raise the data-port baud to >= 2 Mbaud (SysConfig/board init). At 2.5Mbaud
%        (3.6us/byte) 6596*3.6 = 23.7 ms < 50 ms -> fits. Bonus: baud != 1250000 also
%        bypasses the drop-check at mmwave_demo.c:564. Host/USB-UART must support it.
%    (B) on-chip 16->1 mean-steering projection (Scheme C in firmware): emit 1 complex
%        /bin instead of 16 -> 103*4 = 412 B/frame -> 3.7 ms -> 20fps + full room with
%        huge margin, AND the IoT uplink drops to ~8 KB/s. This is Scheme C moved into
%        the modified demo; the vitals pipeline consumes phase only, so it's lossless.
%   Fallback with NO firmware change: 10 fps (framePeriod 100) fits at 1.25 Mbaud
%   (65.9 KB/s) — set field5 = 100 below.
%
% >>> VALIDATE ON THE LIVE SENSOR (config is rejected at sensorStart if bad):
%   1. If sensorStart rejects the 103-bin window (demo TLV buffer / L3), lower numBins.
%   2. If the FECSS rejects startFreq 57.0, bump to 57.5 and drop slope to ~118.

sensorStop 0
channelCfg 153 255 0
chirpComnCfg 10 0 0 1024 1 55.0 3
chirpTimingCfg 6 63 0 125 57
adcDataDitherCfg 1
% 20 fps (framePeriod field5 = 50 ms) — user target. NOTE: at 1.25 Mbaud this 103-bin
% window over-runs the 50ms frame (59.4ms) and the RA TLV is dropped; needs the baud
% bump or on-chip projection in the header. For a working stream with NO firmware
% change, set field5 = 100 (10 fps). 64 chirps/burst, 1 burst/frame, continuous.
frameCfg 64 0 5000 1 50 0
gpAdcMeasConfig 0 0
% vitals mode: pointCloud + stats on; rangeProfile/rangeDoppler off to save UART.
% guiMonitor arg4 (rangeAzimuthHeatMap) is the enable gate reused by rangeAntennaOutput
% below, so it is overridden by the rangeAntennaOutput line that follows.
guiMonitor 1 0 0 0 0 1
% Range-antenna zero-Doppler TLV (type 8): the slow-time cube the vitals pipeline needs.
% Spatial3D server directive (radar ignores '%'): per-bin acquisition params.
% spatial3d: snapshots=100 min_snapshots=10 rounds=4 layer_timeout=30 timeout=120
% Whole 1.8-4.2m room in ONE window: bins 77-179 (103 bins).
% 6.59 KB/frame: @20fps=131.8KB/s (needs >=2Mbaud, see header), @10fps=65.9KB/s (1.25M ok).
rangeAntennaOutput 77 103 1
cfarProcCfg 0 2 8 4 3 0 9.0 0
cfarProcCfg 1 2 4 2 2 1 9.0 0
cfarFovCfg 0 0.25 9.0
cfarFovCfg 1 -20.16 20.16
aoaProcCfg 64 64
% Elevation FOV -45..+20 per 5.3 (covers floor 0.35-7.5 m horizontal; skips ceiling).
aoaFovCfg -45 45 -45 20
clutterRemoval 0
% RESTORE factory calibration from flash (save=0 restore=1) -> sensorStart ~200ms
% instead of a multi-minute recalibration each config.
factoryCalibCfg 0 1 44 2 0x1ff000
% Runtime (drift) calibration OFF: a static vitals scan doesn't need it, and '1' blocks
% the CLI for minutes each sensorStart.
runtimeCalibCfg 0
antGeometryBoard xWRL6844EVM
adcDataSource 0 adc_test_data_0001.bin
adcLogging 0
lowPowerCfg 1
sensorStart 0 0 0 0
