% profile_vitals_win64.cfg — 20 fps, FIXED 64-bin (1.5 m) range window, CLI-movable start.
% Torso window for a fallen/lying person (~1.6m occupancy; lower limbs carry no vitals).
% numBins is FIXED at 64; only the START BIN moves at runtime via CLI:
%     rangeAntennaOutput <startBin> 64 1
% Constant packet length -> fits 1.25 Mbaud at 20 fps with NO baud change / NO rebuild,
% and the fixed length keeps the runtime move thread-safe (one uint16 field changes).
%
% CLI field units (verified in firmware/mmw_demo_mod/mod/mmw_cli.c):
%   chirpComnCfg <digOutSampRate> <bitsSel> <firSel> <numAdcSamples> <mimoPat> <rampEndUs> <hpfSel>
%   chirpTimingCfg <idleUs> <adcSkipSamples> <txStartUs> <slopeMHzperUs> <startFreqGHz>
%   frameCfg <numChirpsInBurst> <numChirpsAccum> <burstPeriodUs> <numBurstsInFrame> <framePeriodMs> <numFrames>
%   rangeAntennaOutput <startBin> <numBins> <enable>
%
% Range map (unchanged, validated): dR = 2.344 cm/bin ; 64 bins = 1.500 m span.
%
% >>> BANDWIDTH (why 64 bins @20fps fits where 103 did not):
%   RA TLV = 4 + 64 bins x 16 ant x 4 B = 4100 B (+~120 B other TLVs/header) ~= 4216 B
%   @1.25 Mbaud (9 us/B) = 37.9 ms to send  <  50 ms frame (20 fps)  -> fits, ~12 ms
%   left for acquisition (5 ms burst) + DSP. (103 bins needed 59 ms > 50 ms -> dropped.)
%
% >>> MOVING THE WINDOW (runtime, CLI port RA441, after sensorStart):
%   rangeAntennaOutput <startBin> 64 1    % numBins stays 64
%   Keep the 64-bin window inside the 1.8-4.2 m room:
%     startBin 77  -> bins 77..140 = 1.80-3.30 m   (default below)
%     startBin 116 -> bins 116..179 = 2.72-4.20 m  (far edge)
%   Valid startBin for full-room reach: 77..116 ; hard cap startBin <= 448 (512-64).
%   (Wide-scan localization to pick startBin is deferred — for now set it by hand/CLI.)

sensorStop 0
channelCfg 153 255 0
chirpComnCfg 10 0 0 1024 1 55.0 3
chirpTimingCfg 6 63 0 125 57
adcDataDitherCfg 1
% 20 fps (framePeriod field5 = 50 ms). 64-bin window fits at 1.25 Mbaud (see header).
frameCfg 64 0 5000 1 50 0
gpAdcMeasConfig 0 0
% vitals mode: pointCloud + stats on; rangeProfile/rangeDoppler off to save UART.
% guiMonitor arg4 (rangeAzimuthHeatMap) is the enable gate reused by rangeAntennaOutput.
guiMonitor 1 0 0 0 0 1
% FIXED 64-bin (1.5m) window, default start at bin 77 (1.80 m). Move at runtime with
% rangeAntennaOutput <startBin> 64 1 on the CLI port. numBins stays 64 -> constant packet.
% spatial3d: snapshots=100 min_snapshots=10 rounds=4 layer_timeout=30 timeout=120
rangeAntennaOutput 77 64 1
cfarProcCfg 0 2 8 4 3 0 9.0 0
cfarProcCfg 1 2 4 2 2 1 9.0 0
cfarFovCfg 0 0.25 9.0
cfarFovCfg 1 -20.16 20.16
aoaProcCfg 64 64
aoaFovCfg -45 45 -45 20
clutterRemoval 0
factoryCalibCfg 0 1 44 2 0x1ff000
runtimeCalibCfg 0
antGeometryBoard xWRL6844EVM
adcDataSource 0 adc_test_data_0001.bin
adcLogging 0
lowPowerCfg 1
sensorStart 0 0 0 0
