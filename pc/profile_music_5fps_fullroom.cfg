% profile_4T4R_music.cfg — Spatial3D optimized MUSIC calibration profile (AWRL6844.md 5.4)
% Derived from profile_4T4R_tdm.cfg by maximizing range resolution for off-chip MUSIC.
% CLI field units (verified in mmw_cli.c):
%   chirpComnCfg <digOutSampRate> <bitsSel> <firSel> <numAdcSamples> <mimoPat> <rampEndUs> <hpfSel>
%     Fs[Msps] = 200/digOutSampRate ;  numRangeBins = numAdcSamples/2 (real sampling)
%   chirpTimingCfg <idleUs> <adcSkipSamples> <txStartUs> <slopeMHzperUs> <startFreqGHz>
%
% Design (this file):
%   Fs = 200/10 = 20 Msps ; numAdcSamples = 1024 -> numRangeBins = 512
%   adcTime = 1024/20 = 51.2 us ; skip 63 samp = 3.15 us ; rampEnd 55 us (0.65us margin)
%   slope 125 MHz/us -> ADC BW = 125*51.2 = 6.4 GHz -> dR = c/(2B) = 2.344 cm
%   ramp span = 125*55 = 6.875 GHz : 57.0 -> 63.875 GHz (fits 57-64 band, 0.125 GHz margin)
%   R_max = 512 * 2.344cm = 12.0 m
%
% NOTE: a literal 7 GHz ADC bandwidth is NOT feasible — the whole 57-64 band is 7 GHz and
% skip+settle must fit, so ramp would exceed 64 GHz. 6.4 GHz (dR 2.34cm) is the safe max.
%
% >>> TWO THINGS TO VALIDATE ON THE LIVE SENSOR (config is rejected at sensorStart if bad):
%   1. RF band edge: if the FECSS rejects startFreq 57.0, bump to 57.5 and drop slope to ~118.
%   2. L3 memory: radar cube = 512 bins x 16 chirps x 16 ant x 4B = 512 KB (4x the current
%      128 KB). If sensorStart errors on allocation, fall back to numAdcSamples 512
%      (chirpComnCfg ... 512 ...) -> 256 bins, dR still ~2.34cm at half the range extent,
%      or halve numOfChirpsInBurst.

sensorStop 0
channelCfg 153 255 0
chirpComnCfg 10 0 0 1024 1 55.0 3
chirpTimingCfg 6 63 0 125 57
adcDataDitherCfg 1
% 5 fps (field5 100->200): halves frame rate to double the per-frame UART budget,
% so one range-antenna window can carry the whole room (H=2m: bins 87-270).
frameCfg 64 0 5000 1 200 0
gpAdcMeasConfig 0 0
% MUSIC calibration mode: pointCloud + stats on; rangeProfile/rangeDoppler off to save UART.
% guiMonitor arg4 (rangeAzimuthHeatMap) is the enable gate reused by rangeAntennaOutput below,
% so it is overridden by the rangeAntennaOutput line that follows.
guiMonitor 1 0 0 0 0 1
% Range-antenna zero-Doppler TLV (type 8). At 5fps ONE window covers the whole room
% (no 3-layer rolling needed — the firmware ignores mid-session rangeAntennaOutput anyway).
% Spatial3D server directive (radar ignores '%'): per-bin MUSIC acquisition params.
% The server reads K (snapshots/bin) and dwell settings from this line; layers come
% from every rangeAntennaOutput above (active + Layer 2/3 comments).
% spatial3d: snapshots=100 min_snapshots=10 rounds=4 layer_timeout=30 timeout=120
% Whole room in ONE window @5fps: bins 87-270 (2.03-6.32m) for H=2m mount.
% 184 bins x 16 ant x 4B = 11.8KB/frame x 5fps = 59KB/s < 73.7 UART budget.
% If sensorStart rejects 184 (demo TLV buffer / L3), reduce num_bins.
rangeAntennaOutput 87 184 1
cfarProcCfg 0 2 8 4 3 0 9.0 0
cfarProcCfg 1 2 4 2 2 1 9.0 0
cfarFovCfg 0 0.25 9.0
cfarFovCfg 1 -20.16 20.16
aoaProcCfg 64 64
% Elevation FOV narrowed to -45..+20 per 5.3 (covers floor 0.35-7.5 m horizontal; skips ceiling).
aoaFovCfg -45 45 -45 20
clutterRemoval 0
% RESTORE mode: load the factory calibration already saved in flash (save=0 restore=1)
% so sensorStart is ~200ms instead of re-running a multi-minute calibration each config.
% (The base profile_4T4R_music.cfg uses save=1 to perform+save it the first time.)
factoryCalibCfg 0 1 44 2 0x1ff000
% Runtime calibration OFF: with '1' every sensorStart re-runs a temperature-drift
% calibration that blocks the CLI for minutes (kills fast layer switching). A 15s
% static scan doesn't need drift compensation, so disable it -> sensorStart ~200ms.
runtimeCalibCfg 0
antGeometryBoard xWRL6844EVM
adcDataSource 0 adc_test_data_0001.bin
adcLogging 0
lowPowerCfg 1
sensorStart 0 0 0 0
